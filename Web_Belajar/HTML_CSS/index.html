    <style>#toasty {
        position: fixed;
        z-index: 999999
    }

    #toasty .close-button:focus {
        outline: 0
    }

    #toasty.toasty-position-top-left {
        top: 12px;
        left: 12px
    }

    #toasty.toasty-position-top-right {
        top: 12px;
        right: 12px
    }

    #toasty.toasty-position-bottom-right {
        bottom: 12px;
        right: 12px
    }

    #toasty.toasty-position-bottom-left {
        bottom: 12px;
        left: 12px
    }

    #toasty.toasty-position-top-center {
        top: 12px;
        left: 50%;
        -webkit-transform: translate(-50%, 0);
        transform: translate(-50%, 0)
    }

    #toasty.toasty-position-bottom-center {
        bottom: 12px;
        left: 50%;
        -webkit-transform: translate(-50%, 0);
        transform: translate(-50%, 0)
    }

    #toasty.toasty-position-center-center {
        top: 50%;
        left: 50%;
        -webkit-transform: translate(-50%, 0);
        transform: translate(-50%, 0)
    }

    #toasty .toast {
        cursor: pointer;
        margin: 0 0 6px;
        padding: 0;
        width: 285px;
        height: 65px;
        display: table;
        background-size: 24px 24px;
        background-position: 15px center;
        background-repeat: no-repeat;
        box-shadow: 0 0 5px 0 rgba(0, 0, 0, .25);
        opacity: .9;
        position: relative
    }

    #toasty .toast .close-button {
        padding: 0;
        cursor: pointer;
        background: 0 0;
        border: 0;
        -webkit-appearance: none;
        position: absolute;
        right: 10px;
        top: 3px;
        opacity: .5;
        filter: alpha(opacity=50)
    }

    #toasty .toast .close-button:focus, #toasty .toast .close-button:hover {
        text-decoration: none;
        cursor: pointer;
        opacity: 1;
        filter: alpha(opacity=100)
    }

    #toasty .toast .toast-text {
        padding: 5px 20px 5px 60px;
        display: table-cell;
        vertical-align: middle
    }

    #toasty .toast .toast-text .toast-title {
        font-weight: 700
    }

    #toasty .toast .toast-text a:hover, #toasty .toast .toast-text label:hover {
        text-decoration: none
    }

    #toasty .toast.toasty-theme-bootstrap {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif !important;
        font-size: 12px;
        border-radius: 4px;
        border: 1px solid transparent
    }

    #toasty .toast.toasty-theme-bootstrap .close-button:after {
        content: 'x';
        color: #fff;
        font-size: 17px;
        font-weight: 100
    }

    #toasty .toast.toasty-theme-bootstrap .toast-text {
        color: #fff
    }

    #toasty .toast.toasty-theme-bootstrap .toast-text .toast-title {
        font-size: 13px
    }

    #toasty .toast.toasty-theme-bootstrap .toast-text a, #toasty .toast.toasty-theme-bootstrap .toast-text label {
        color: #fff
    }

    #toasty .toast.toasty-theme-bootstrap .toast-text a:hover, #toasty .toast.toasty-theme-bootstrap .toast-text label:hover {
        color: #f2f2f2

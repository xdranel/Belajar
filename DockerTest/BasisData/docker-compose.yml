services:
  mysql:
    image: mysql:8.0
    container_name: test-docker-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rahasia123
      MYSQL_DATABASE: test_docker
      MYSQL_USER: john
      MYSQL_PASSWORD: rahasia123
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mysql_network

